<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstralOS</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="https://emojiisland.com/cdn/shop/products/Rocket_Emoji_grande.png?v=1571606064">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00d2ff;
            --text: #ffffff;
        }

        body { 
            margin: 0; background: #050505; font-family: 'Inter', system-ui, sans-serif; 
            overflow: hidden; height: 100vh; color: var(--text); transition: opacity 0.3s ease;
        }

        /* Constellation Canvas */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Desktop Grid */
        #desktop { 
            padding: 40px; display: grid; grid-template-columns: repeat(auto-fill, 200px); 
            gap: 30px; height: calc(100vh - 60px); justify-items: start; align-items: start;
            transition: opacity 0.3s;
        }

        .icon { 
            width: 150px; height: 150px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 24px; border: 1px solid transparent; background: transparent;
        }

        .icon:hover { 
            background: var(--glass-bg); border-color: var(--glass-border);
            backdrop-filter: blur(10px); transform: scale(1.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .icon img { 
            width: 100px; height: 100px; object-fit: cover; border-radius: 22px; 
            margin-bottom: 10px; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.4));
        }

        .icon span { font-size: 0.9rem; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* Window Styling */
        .window {
            position: absolute; top: 50px; left: 50px; width: 850px; height: 550px;
            background: rgba(15, 15, 15, 0.9); border: 1px solid var(--glass-border); 
            display: none; flex-direction: column; box-shadow: 0 25px 60px rgba(0,0,0,0.6); 
            border-radius: 18px; overflow: hidden; backdrop-filter: blur(20px);
            transition: opacity 0.3s ease; z-index: 10;
        }

        /* Snapping & Maximizing Animations */
        .window.animating { transition: all 0.2s ease; }
        .window.maximized { top: 0 !important; left: 0 !important; width: 100vw !important; height: calc(100vh - 50px) !important; border-radius: 0; }

        .title-bar {
            background: rgba(255, 255, 255, 0.05); padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; cursor: move;
        }

        .control-btn { 
            width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; transition: 0.2s; color: white;
        }
        .close-btn { background: #ff5f57; }
        .max-btn { background: #febc2e; margin-right: 8px; }

        .content { flex-grow: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Taskbar */
        #taskbar {
            position: absolute; bottom: 0; width: 100%; height: 50px;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border); display: flex; 
            justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box;
            z-index: 1000; transition: opacity 0.3s;
        }

        .taskbar-left { display: flex; align-items: center; gap: 15px; }

        .start-btn {
            font-weight: 800; color: var(--accent); letter-spacing: 1px; cursor: pointer;
            padding: 5px 15px; border-radius: 8px; transition: 0.2s; font-size: 1.1rem;
        }
        .start-btn:hover { background: var(--glass-bg); }

        /* Search Bar */
        .search-bar {
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border);
            color: white; padding: 6px 15px; border-radius: 15px; width: 200px;
            outline: none; font-family: 'Inter', sans-serif; transition: 0.3s;
        }
        .search-bar:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--accent); width: 250px; }

        .system-tray { display: flex; align-items: center; gap: 20px; font-size: 0.85rem; }

        /* Start Menu */
        #start-menu {
            position: absolute; bottom: 60px; left: 20px; width: 300px;
            background: rgba(15, 15, 15, 0.95); border: 1px solid var(--glass-border);
            border-radius: 12px; backdrop-filter: blur(20px); box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: none; flex-direction: column; z-index: 999;
            transform: translateY(10px); opacity: 0; transition: all 0.2s ease;
        }
        #start-menu.active { display: flex; transform: translateY(0); opacity: 1; }
        
        .start-header { padding: 15px; border-bottom: 1px solid var(--glass-border); font-weight: 600; }
        .start-settings { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--glass-border); }
        .start-settings input[type="color"] { background: none; border: none; cursor: pointer; width: 30px; height: 30px; }

        /* Ghost Mode Class */
        .ghost-mode { opacity: 0.02 !important; pointer-events: none !important; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="desktop">
    <div class="icon app-icon" data-name="Gn-Math" onclick="openApp('https://cdn.jsdelivr.net/gh/jupitergoesbrr/Astral-Project@main/vkaol9qz55txpzbdlecc.html', 'Gn-Math')">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSouvw87ibcDbRABq9KJwh52jU_1VRQ2TM5XQ&s" alt="Game">
        <span>Gn-Math</span>
    </div>
    <div class="icon app-icon" data-name="GhostLink" onclick="openApp('https://cdn.jsdelivr.net/gh/virtuan4-max/ghostlinkhub@main/ghostlinksinglefile.html?t=', 'GhostLink')">
        <img src="https://i.postimg.cc/SKXVV9hd/logo.png" alt="Game">
        <span>GhostLink</span>
    </div>
 <div class="icon app-icon" data-name="UGS Games" onclick="openApp('https://cdn.jsdelivr.net/gh/jupitergoesbrr/Astral-Project@main/clSINGLEFILE.html?t=', 'UGS Games')">
        <img src="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico" alt="Game">
        <span>UGS Files</span>
     <div class="icon app-icon" data-name="Shooym Games" onclick="openApp('https://cdn.jsdelivr.net/gh/jupitergoesbrr/Astral-Project@main/ShooymGames.html?t=', 'UGS Games')">
        <img src="https://cdn.freebiesupply.com/logos/large/2x/x-games-2-logo-svg-vector.svg" alt="Game">
        <span>Shooym Games</span>
    </div>
    </div>
</div>

<div id="start-menu">
    <div class="start-header">Astral Settings</div>
    <div style="padding: 15px; font-size: 0.85rem; color: #ccc;">
        <p><strong>Panic:</strong> Press <code>`</code></p>
        <p><strong>Ghost Mode:</strong> Press <code>Alt + G</code></p>
    </div>
    <div class="start-settings">
        <label>Constellation Color:</label>
        <input type="color" id="theme-color" value="#00d2ff" onchange="updateThemeColor(this.value)">
    </div>
</div>

<div id="appWindow" class="window">
    <div class="title-bar" id="windowHeader">
        <span id="windowTitle">Loading...</span>
        <div style="display: flex;">
            <button class="control-btn max-btn" onclick="toggleMaximize()">▢</button>
            <button class="control-btn close-btn" onclick="closeApp()">✕</button>
        </div>
    </div>
    <div class="content">
        <iframe id="appFrame"></iframe>
    </div>
</div>

<div id="taskbar">
    <div class="taskbar-left">
        <div class="start-btn" onclick="toggleStartMenu()">ASTRAL</div>
        <input type="text" class="search-bar" placeholder="Search apps..." onkeyup="searchApps(this.value)">
    </div>
    <div class="system-tray">
        <div id="battery-status">🔋 --%</div>
        <div id="system-date">--/--/--</div>
        <div id="system-time" style="font-weight: bold; min-width: 45px;">00:00</div>
    </div>
</div>

<script>
    // --- APP & UI LOGIC ---
    const win = document.getElementById('appWindow');
    const frame = document.getElementById('appFrame');
    const title = document.getElementById('windowTitle');
    const startMenu = document.getElementById('start-menu');

    async function openApp(url, name) {
        title.innerText = "Loading " + name + "...";
        win.style.display = 'flex';
        startMenu.classList.remove('active'); // Close start menu if open
        try {
            const response = await fetch(url);
            const htmlCode = await response.text();
            frame.srcdoc = htmlCode;
            title.innerText = name;
        } catch (err) {
            frame.srcdoc = "<h1>Error loading application</h1>";
        }
    }

    function closeApp() { win.style.display = 'none'; frame.srcdoc = ''; }
    
    function toggleMaximize() { 
        win.classList.add('animating');
        win.classList.toggle('maximized'); 
        setTimeout(() => win.classList.remove('animating'), 200);
    }

    function toggleStartMenu() { startMenu.classList.toggle('active'); }

    // --- SEARCH FUNCTIONALITY ---
    function searchApps(query) {
        query = query.toLowerCase();
        const apps = document.querySelectorAll('.app-icon');
        apps.forEach(app => {
            const name = app.getAttribute('data-name').toLowerCase();
            if (name.includes(query)) {
                app.style.display = 'flex';
            } else {
                app.style.display = 'none';
            }
        });
    }

    // --- TAB CLOAKING, PANIC KEY & GHOST MODE ---
    const originalTitle = "AstralOS";
    const originalFavicon = "https://emojiisland.com/cdn/shop/products/Rocket_Emoji_grande.png?v=1571606064"; 
    const cloakTitle = "Google Docs";
    const cloakFavicon = "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico";

    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            document.title = cloakTitle;
            document.getElementById('favicon').href = cloakFavicon;
        } else {
            document.title = originalTitle;
            document.getElementById('favicon').href = originalFavicon;
        }
    });

    // Keys
    let isGhost = false;
    window.addEventListener('keydown', (e) => {
        // Panic Key (` Backtick)
        if (e.key === '`') {
            window.location.href = 'https://www.classroom.google.com';
        }
        // Ghost Mode (Alt + G)
        if (e.altKey && e.key.toLowerCase() === 'g') {
            isGhost = !isGhost;
            const elementsToHide = [win, document.getElementById('taskbar'), document.getElementById('desktop'), startMenu];
            elementsToHide.forEach(el => {
                if (isGhost) el.classList.add('ghost-mode');
                else el.classList.remove('ghost-mode');
            });
        }
    });

    // --- SYSTEM INFO ---
    function updateSystemInfo() {
        const now = new Date();
        document.getElementById('system-time').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('system-date').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                document.getElementById('battery-status').innerText = `🔋 ${Math.floor(battery.level * 100)}%`;
            });
        }
    }
    setInterval(updateSystemInfo, 1000); updateSystemInfo();

    // --- CONSTELLATION BACKGROUND & THEME ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const mouse = { x: null, y: null, radius: 170 };
    
    // Default Theme Color (RGB array)
    let themeRGB = [0, 210, 255]; 

    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? [parseInt(result[1], 16), parseInt(result[2], 16), parseInt(result[3], 16)] : [255, 255, 255];
    }

    function updateThemeColor(hex) {
        themeRGB = hexToRgb(hex);
        document.documentElement.style.setProperty('--accent', hex);
    }

    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = Math.random() * 0.5 - 0.25; this.speedY = Math.random() * 0.5 - 0.25;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
            if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
        }
        draw() {
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    function initBg() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        particles = []; for (let i = 0; i < 110; i++) particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update(); p.draw();
            particles.forEach(p2 => {
                const dx = p.x - p2.x; const dy = p.y - p2.y; const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 100) {
                    ctx.strokeStyle = `rgba(${themeRGB[0]}, ${themeRGB[1]}, ${themeRGB[2]}, ${1 - distance/100})`;
                    ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }
            });
            const mdx = p.x - mouse.x; const mdy = p.y - mouse.y; const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
            if (mDist < mouse.radius && !isGhost) { // Don't track mouse if ghosting
                ctx.strokeStyle = `rgba(255, 255, 255, ${1 - mDist/mouse.radius})`;
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
            }
        });
        requestAnimationFrame(animate);
    }
    window.addEventListener('resize', initBg); initBg(); animate();

    // --- DRAG & WINDOW SNAPPING ---
    function dragElement(elmnt) {
        let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
        document.getElementById("windowHeader").onmousedown = dragMouseDown;
        
        function dragMouseDown(e) {
            if (win.classList.contains('maximized')) return;
            e.preventDefault();
            
            // If snapped, unsnap it smoothly when dragging starts
            if (win.style.width === '50vw') {
                win.style.width = '850px';
                win.style.height = '550px';
                win.style.left = (e.clientX - 400) + 'px'; // Center window on mouse
            }

            p3 = e.clientX; p4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }
        
        function elementDrag(e) {
            e.preventDefault();
            p1 = p3 - e.clientX; p2 = p4 - e.clientY;
            p3 = e.clientX; p4 = e.clientY;
            elmnt.style.top = (elmnt.offsetTop - p2) + "px";
            elmnt.style.left = (elmnt.offsetLeft - p1) + "px";
        }
        
        function closeDragElement(e) { 
            document.onmouseup = null; document.onmousemove = null; 
            
            // Snapping Logic
            win.classList.add('animating');
            if (e.clientX < 30) { 
                // Snap Left
                win.style.left = '0px'; win.style.top = '0px';
                win.style.width = '50vw'; win.style.height = 'calc(100vh - 50px)';
            } else if (e.clientX > window.innerWidth - 30) {
                // Snap Right
                win.style.left = '50vw'; win.style.top = '0px';
                win.style.width = '50vw'; win.style.height = 'calc(100vh - 50px)';
            } else if (e.clientY < 10) {
                // Snap Top to Maximize
                toggleMaximize();
            }
            setTimeout(() => win.classList.remove('animating'), 200);
        }
    }
    dragElement(win);

    // Close Start menu if clicking outside
    document.addEventListener('click', (e) => {
        if (!startMenu.contains(e.target) && !e.target.classList.contains('start-btn')) {
            startMenu.classList.remove('active');
        }
    });
</script>
</body>
</html>
