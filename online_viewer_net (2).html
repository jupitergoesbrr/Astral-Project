<!DOCTYPE html> <html>  <head>     <title>The Astral Project</title>     <style>         :root {             --accent-blue: #4a90e2;             --hover-blue: #79aadb;             --dark-cosmic: #0a192f;             --glass: rgba(255, 255, 255, 0.05);             --border: rgba(74, 144, 226, 0.2);             --ios-radius: 22%;         }          /* --- Custom Cursor --- */         body {             font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;             background: #050a14;             height: 100vh;             margin: 0;             padding: 0;             display: flex;             overflow: hidden;             color: white;             cursor: none;         }          #glowing-cursor {             position: fixed;             width: 12px;             height: 12px;             background: #fff;             border-radius: 50%;             pointer-events: none;             transform: translate(-50%, -50%);             box-shadow: 0 0 15px 5px rgba(121, 170, 219, 0.6);             z-index: 9999;             transition: width 0.1s;         }          /* Binary Background */         #binary-canvas {             position: fixed;             top: 0;             left: 0;             width: 100%;             height: 100%;             z-index: -1;             pointer-events: none;             opacity: 0.3;         }          /* --- SIDEBAR --- */         .sidebar {             position: relative;             width: 85px;             height: 100vh;             background: rgba(5, 10, 20, 0.9);             backdrop-filter: blur(25px);             padding: 30px 10px;             display: flex;             flex-direction: column;             align-items: center;             gap: 15px;             overflow-y: auto;             border-right: 1px solid var(--border);             z-index: 10;         }          .sidebar a,         .sidebar .sidebar-btn {             width: 48px;             height: 48px;             display: flex;             align-items: center;             justify-content: center;             background: var(--dark-cosmic) !important;             border: 1px solid var(--accent-blue) !important;             border-radius: 14px;             color: var(--hover-blue) !important;             text-decoration: none;             font-weight: 900;             transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);             cursor: none !important;         }          .sidebar a:hover {             background: var(--accent-blue) !important;             color: #fff !important;             transform: scale(1.1) rotate(5deg);         }          /* --- MAIN CONTENT & SECTIONS --- */         .main-content {             position: relative;             flex: 1;             height: 100vh;             overflow-y: auto;             padding: 40px 20px;             z-index: 5;             scroll-behavior: smooth;         }          .section-header {             max-width: 900px;             margin: 40px auto 20px auto;             font-size: 22px;             font-weight: 800;             color: var(--hover-blue);             text-transform: uppercase;             letter-spacing: 1px;             border-bottom: 1px solid var(--border);             padding-bottom: 10px;         }          h1 {             font-size: 3.5rem;             letter-spacing: 4px;             text-transform: uppercase;             text-align: center;             background: linear-gradient(to bottom, #ffffff, #a5c7ff);             -webkit-background-clip: text;             -webkit-text-fill-color: transparent;             margin-bottom: 30px;         }          /* --- SEARCH --- */         .search-container {             max-width: 650px;             margin: 0 auto 50px auto;         }          #astral-search {             width: 100%;             padding: 20px 35px;             font-size: 18px;             background: rgba(0, 0, 0, 0.6);             border: 2px solid var(--accent-blue);             border-radius: 50px;             color: white;             outline: none;             backdrop-filter: blur(15px);             cursor: none;             box-shadow: 0 0 25px rgba(74, 144, 226, 0.1);         }          /* --- TRENDING GRID --- */         .trending-grid {             display: grid;             grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));             gap: 35px;             max-width: 950px;             margin: 0 auto 60px auto;             justify-items: center;         }          .trending-card {             width: 120px;             display: flex;             flex-direction: column;             align-items: center;             gap: 12px;             transition: 0.4s;             cursor: none;         }          .app-icon {             width: 110px;             height: 110px;             border-radius: var(--ios-radius);             border: 2px solid rgba(255, 255, 255, 0.1);             background-size: cover;             background-position: center;             box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);         }          .trending-card:hover {             transform: translateY(-10px);         }          /* --- GAME BUTTONS + HOVER PULSE --- */         .buttons-container {             display: grid;             grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));             gap: 18px;             max-width: 900px;             margin: 0 auto;         }          input[type="button"] {             background: rgba(255, 255, 255, 0.03) !important;             backdrop-filter: blur(10px);             border: 1px solid var(--border) !important;             padding: 20px 28px !important;             font-size: 17px !important;             border-radius: 18px !important;             color: white !important;             text-align: left !important;             width: 100% !important;             cursor: none !important;             transition: all 0.3s ease !important;         }          /* The Pulse Effect */         input[type="button"]:hover {             border-color: var(--hover-blue) !important;             background: rgba(74, 144, 226, 0.15) !important;             box-shadow: 0 0 20px rgba(74, 144, 226, 0.4);             transform: scale(1.02) translateX(5px);         }          /* Favorite Star indicator */         .fav-active::after {             content: ' ★';             color: #ffd700;             float: right;         }          .random-btn {             position: fixed;             bottom: 45px;             right: 45px;             width: 90px;             height: 90px;             background: radial-gradient(circle at 30% 30%, #ff5e4d, #e74c3c);             color: white;             border: 5px solid rgba(255, 255, 255, 0.2);             border-radius: 50%;             font-size: 40px;             display: flex;             align-items: center;             justify-content: center;             box-shadow: 0 15px 45px rgba(231, 76, 60, 0.6);             z-index: 100;             cursor: none;             animation: pulse-red 2s infinite;         }          @keyframes pulse-red {             0% {                 box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7);             }              70% {                 box-shadow: 0 0 0 30px rgba(231, 76, 60, 0);             }              100% {                 box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);             }         }     </style> </head>  <body>     <div id="glowing-cursor"></div> <canvas id="binary-canvas"></canvas>     <div class="sidebar" id="sidebar"></div>     <div class="main-content">         <h1>The Astral Project</h1>         <center>             <div class="search-container"> <input type="text" id="astral-search" placeholder="🔍 Search For Games...">             </div>         </center>         <div id="favorites-section" style="display:none;">             <div class="section-header">⭐ Favorites</div>             <div id="favorites-container" class="buttons-container" style="margin-bottom: 40px;"></div>         </div>         <div id="recent-section" style="display:none;">             <div class="section-header">🕒 Recently Played</div>             <div id="recent-container" class="buttons-container" style="margin-bottom: 40px;"></div>         </div>         <div class="trending-container">             <div class="section-header" style="text-align:center; border:none;">🔥 Trending Games</div>             <div class="trending-grid">                 <div class="trending-card" onclick="launchGame('Minecraft')">                     <div class="app-icon"                         style="background-image: url('https://yt3.googleusercontent.com/scvGT8SucZvs5yIkBBFQ0s0IQS1kPiiJgtYGUCTtRpIfSq6laBJ-5bPieuzrHuyVWIy0XxN4Ww=s900-c-k-c0x00ffffff-no-rj');">                     </div>                     <div class="app-label">Minecraft</div>                 </div>                 <div class="trending-card" onclick="launchGame('Subway Surfers')">                     <div class="app-icon"                         style="background-image: url('https://e.snmc.io/lk/o/x/444cda720211af562927420daf3f445e/5282921');">                     </div>                     <div class="app-label">Subway Surfers</div>                 </div>                 <div class="trending-card" onclick="launchGame('Burrito Bison')">                     <div class="app-icon"                         style="background-image: url('https://m.media-amazon.com/images/I/71uaF+NaGmL.png');"></div>                     <div class="app-label">Burrito Bison</div>                 </div>                 <div class="trending-card" onclick="launchGame('Papa')">                     <div class="app-icon"                         style="background-image: url('https://play-lh.googleusercontent.com/oOJSaZIe_D7tJdNVpXzpUwKH40sPma3OTWUUCarH5hzJTfL7Sv3DAr7-MuQsAJaRXA');">                     </div>                     <div class="app-label">Papa's</div>                 </div>                 <div class="trending-card" onclick="launchGame('1v1.lol')">                     <div class="app-icon" style="background-image: url('https://cpsgames.org/thumbs/1v1-lol_2.webp');">                     </div>                     <div class="app-label">1v1.lol</div>                 </div>             </div>         </div> <button class="random-btn" onclick="playRandom()">🎲</button>         <div id="sections-container"></div>     </div>     <script src="https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/games.js"></script>     <script>         /* ====================================            1. STEALTH & SYSTEM STORAGE            ==================================== */         let recentGames = JSON.parse(localStorage.getItem('astral_recent')) || [];         let favoriteGames = JSON.parse(localStorage.getItem('astral_favs')) || [];          /* Panic Key: Press ` (Backtick) to fake Google Drive */document.addEventListener('keydown', (e) => {             if (e.key === '`') {                 document.title = "Google Drive - My Drive";                 const link = document.querySelector("link[rel*='icon']") || document.createElement('link');                 link.type = 'image/x-icon'; link.rel = 'shortcut icon';                 link.href = 'https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png';                 document.getElementsByTagName('head')[0].appendChild(link);                 document.body.innerHTML = "<div style='background:white; height:100vh; width:100vw;'></div>";             }         });                 function updateStorage(key, list) {             localStorage.setItem(key, JSON.stringify(list));             renderSpecialSections();         }          function renderSpecialSections() {             const favCont = document.getElementById('favorites-container');             const recCont = document.getElementById('recent-container');            if (favoriteGames.length > 0) {                 document.getElementById('favorites-section').style.display = 'block';                 favCont.innerHTML = '';                 favoriteGames.forEach(name => {                     const btn = createGameBtn(name);                     favCont.appendChild(btn);                 });             } else { document.getElementById('favorites-section').style.display = 'none'; }                    if (recentGames.length > 0) {                 document.getElementById('recent-section').style.display = 'block';                 recCont.innerHTML = '';                 recentGames.forEach(name => {                     const btn = createGameBtn(name);                     recCont.appendChild(btn);                 });             } else { document.getElementById('recent-section').style.display = 'none'; }         }          function createGameBtn(name) {             const btn = document.createElement('input');             btn.type = 'button';             btn.value = name;             if (favoriteGames.includes(name)) btn.classList.add('fav-active');             btn.onclick = () => launchGame(name);             btn.oncontextmenu = (e) => {                 e.preventDefault();                 toggleFavorite(name);             };             return btn;         }          function toggleFavorite(name) {             if (favoriteGames.includes(name)) {                 favoriteGames = favoriteGames.filter(g => g !== name);             } else {                 favoriteGames.unshift(name);             }             updateStorage('astral_favs', favoriteGames);         }                     function logRecent(name) {             recentGames = recentGames.filter(g => g !== name);             recentGames.unshift(name);             if (recentGames.length > 6) recentGames.pop();             updateStorage('astral_recent', recentGames);         }                       const canvas = document.getElementById('binary-canvas');         const ctx = canvas.getContext('2d');         let fontSize = 16, columns, drops = [];          function initBinary() {             canvas.width = window.innerWidth; canvas.height = window.innerHeight;             columns = Math.floor(canvas.width / fontSize);             drops = Array(columns).fill(1);         }          function drawBinary() {             ctx.fillStyle = "rgba(5, 10, 20, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);             ctx.fillStyle = "#4a90e2"; ctx.font = fontSize + "px monospace";             for (let i = 0; i < drops.length; i++) {                 const text = Math.floor(Math.random() * 2);                 ctx.fillText(text, i * fontSize, drops[i] * fontSize);                 if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;                 drops[i] += 0.5;             }         }          function formatGameName(name) {             let clean = name.trim();             if (clean.toLowerCase().startsWith('cl ')) clean = clean.substring(3);             else if (clean.toLowerCase().startsWith('cl')) clean = clean.substring(2);             return clean.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/([A-Z])([A-Z][a-z])/g, '$1 $2');         }          setInterval(() => {             document.querySelectorAll('#sections-container input[type="button"]').forEach(btn => {                 if(!btn.dataset.cleaned) {                     btn.value = formatGameName(btn.value);                     btn.dataset.cleaned = "true";                                          const originalClick = btn.onclick;                     btn.onclick = (e) => {                         logRecent(btn.value);                         if (originalClick) originalClick.apply(btn, [e]);                     };                                          btn.oncontextmenu = (e) => {                         e.preventDefault();                         toggleFavorite(btn.value);                     };                 }             });         }, 500);          const cursor = document.getElementById('glowing-cursor');         document.addEventListener('mousemove', (e) => {             cursor.style.left = e.clientX + 'px';             cursor.style.top = e.clientY + 'px';         });          document.getElementById('astral-search').addEventListener('input', function(e) {             const term = e.target.value.toLowerCase();             document.querySelectorAll('input[type="button"]').forEach(btn => {                 if(btn.className !== 'random-btn') {                     btn.style.display = btn.value.toLowerCase().includes(term) ? 'block' : 'none';                 }             });         });          function launchGame(searchName) {             const buttons = document.querySelectorAll('#sections-container input[type="button"]');             for (let btn of buttons) {                 if (btn.value.toLowerCase().includes(searchName.toLowerCase())) {                     btn.click(); return;                 }             }         }          function playRandom() {             const buttons = document.querySelectorAll('#sections-container input[type="button"]');             if (buttons.length > 0) buttons[Math.floor(Math.random() * buttons.length)].click();         }          window.addEventListener('resize', initBinary);         initBinary(); setInterval(drawBinary, 30);         renderSpecialSections();               </script> </body>  </html>
