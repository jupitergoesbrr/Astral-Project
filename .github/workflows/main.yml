name: Deploy to Bunny.net

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload to Bunny Storage
        # Switched to the maintained version
        uses: ayeressian/bunnycdn-storage-deploy@2.4.6
        with:
          source: './' 
          storageZoneName: 'astral-os'
          storagePassword: ${{ secrets.BUNNY_STORAGE_PASS }}
          remove: "true" # Must be a string "true" for this action
          upload: "true"

      - name: Purge Bunny Cache
        # Added the correct endpoint and fixed the syntax
        run: |
          curl -X POST "https://api.bunny.net{{ secrets.BUNNY_PULL_ZONE_ID }}/purgeCache" \
          -H "AccessKey: ${{ secrets.BUNNY_API_KEY }}" \
          -H "Content-Type: application/json"
