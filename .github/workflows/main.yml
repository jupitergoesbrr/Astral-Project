name: Deploy to Bunny.net

on:
  push:
    branches:
      - main  # Runs automatically when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload Everything to Bunny Storage
        env:
          STORAGE_NAME: "astral-os"
          STORAGE_PASS: ${{ secrets.BUNNY_STORAGE_PASS }}
        run: |
          # This command finds every file and uploads it while keeping your folder structure
          find . -type f -not -path '*/.*' -not -path './.github/*' | while read -r file; do
            # Remove the './' from the file path for the upload URL
            dest_path=$(echo "$file" | sed 's|^\./||')
            
            echo "Uploading $dest_path..."
            
            curl -sS -X PUT "https://storage.bunnycdn.com" \
                 -H "AccessKey: $STORAGE_PASS" \
                 -H "Content-Type: application/octet-stream" \
                 --data-binary @"$file"
          done

      - name: Purge Bunny Cache
        # Only runs if the upload step was successful
        if: success()
        run: |
          curl -sS -X POST "https://api.bunny.net{{ secrets.BUNNY_PULL_ZONE_ID }}/purgeCache" \
               -H "AccessKey: ${{ secrets.BUNNY_API_KEY }}" \
               -H "Content-Type: application/json"
