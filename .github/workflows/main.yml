name: Deploy to Bunny.net

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload Everything to Bunny Storage
        env:
          STORAGE_NAME: "astral-os"
          STORAGE_PASS: ${{ secrets.BUNNY_STORAGE_PASS }}
        run: |
          find . -type f -not -path '*/.*' -not -path './.github/*' | while read -r file; do
            dest_path=$(echo "$file" | sed 's|^\./||')
            echo "Uploading $dest_path..."
            curl -sS -X PUT "https://storage.bunnycdn.com" \
                 -H "AccessKey: $STORAGE_PASS" \
                 -H "Content-Type: application/octet-stream" \
                 --data-binary @"$file"
          done

      - name: Purge Bunny Cache
        if: success()
        env:
          # Using env variables is safer for curl URLs
          ZONE_ID: ${{ secrets.BUNNY_PULL_ZONE_ID }}
          API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: |
          echo "Purging Cache for Zone ID: $ZONE_ID"
          curl -sS -X POST "https://api.bunny.net" \
               -H "AccessKey: $API_KEY" \
               -H "Content-Type: application/json"
