name: Deploy to Bunny.net

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload Files to Bunny Storage
        env:
          STORAGE_NAME: "astral-os" # Hardcoded to prevent malformed URL errors
          STORAGE_PASS: ${{ secrets.BUNNY_STORAGE_PASS }}
        run: |
          # Use 'find' to get files and upload them one by one
          find . -maxdepth 1 -type f -not -path '*/.*' -exec sh -c '
            FILE_PATH=$1
            FILENAME=$(basename "$FILE_PATH")
            echo "Uploading $FILENAME..."
            curl -s -X PUT "https://storage.bunnycdn.com" \
                 -H "AccessKey: $STORAGE_PASS" \
                 -H "Content-Type: application/octet-stream" \
                 --data-binary @"$FILE_PATH"
          ' -- {} \;

      - name: Purge Bunny Cache
        if: success()
        run: |
          curl -s -X POST "https://api.bunny.net{{ secrets.BUNNY_PULL_ZONE_ID }}/purgeCache" \
               -H "AccessKey: ${{ secrets.BUNNY_API_KEY }}" \
               -H "Content-Type: application/json"
