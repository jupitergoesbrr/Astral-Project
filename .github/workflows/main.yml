name: Deploy to Bunny.net

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload Files to Bunny Storage
        env:
          STORAGE_NAME: "astral-os"
          STORAGE_PASS: ${{ secrets.BUNNY_STORAGE_PASS }}
        run: |
          # Use find to get files and upload them
          find . -maxdepth 1 -type f -not -path '*/.*' | while read -r file; do
            filename=$(basename "$file")
            echo "Uploading $filename..."
            # FIXED: Using double quotes allows the variables to be read correctly
            curl -sS -X PUT "https://storage.bunnycdn.com" \
                 -H "AccessKey: $STORAGE_PASS" \
                 -H "Content-Type: application/octet-stream" \
                 --data-binary @"$file"
          done
